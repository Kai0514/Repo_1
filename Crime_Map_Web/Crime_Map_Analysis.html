<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>臺北市犯罪數據分析</title>
    <link rel="stylesheet" href="Crime_Map_Analysis.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/zh-tw.js"></script>
</head>
<body>
    <header class="header">
        <h1 id="sys-title">CRIME INTEL SYSTEM</h1>
        <button id="theme-toggle" class="action-button primary">切換模式</button>
    </header>

    <div class="container">
        <div style="display: flex; justify-content: space-between; margin-bottom: 25px;">
            <button onclick="window.location.href='https://kai0514.github.io/Repo_1/Crime_Map_Web/Crime_Map_Heat.html'" class="action-button">← 返回首頁</button>
            <div id="sys-status" style="font-weight: bold; letter-spacing: 1px;">● LIVE FEED ACTIVE</div>
        </div>

        <section class="section">
            <h2 id="filter-title">[ 1. 偵查參數設定 ]</h2>
            <div style="display: flex; gap: 15px; align-items: center; flex-wrap: wrap;">
                <input type="text" id="start-date" class="date-input" placeholder="開始日期">
                <span>至</span>
                <input type="text" id="end-date" class="date-input" placeholder="結束日期">
                <button id="reset-filters" class="action-button" style="color: #FF0033; border-color: #FF0033;">重置所有篩選</button>
            </div>
            <div style="margin-top: 25px;">
                <label>行政管轄區：</label>
                <div id="district-buttons" class="button-group"></div>
            </div>
            <div style="margin-top: 25px;">
                <label>犯罪案件類型：</label>
                <div id="crime-type-buttons" class="button-group"></div>
            </div>
        </section>

        <section class="section">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2>[ 2. 數據分析看板 ]</h2>
                <div style="display: flex; gap: 10px;">
                    <button id="export-chart" class="action-button">📸 匯出分析圖</button>
                    <button id="download-csv" class="action-button primary">📁 導出數據報表</button>
                </div>
            </div>
            <div class="stats-grid">
                <div class="stat-card"><div>總監測案件數</div><div id="total-cases" class="stat-value">0</div></div>
                <div class="stat-card"><div>平均每月案件</div><div id="avg-monthly-cases" class="stat-value">0</div></div>
                <div class="stat-card"><div>最高風險熱區</div><div id="top-district" class="stat-value">-</div></div>
            </div>
            <div class="chart-container"><canvas id="timeSeriesChart"></canvas></div>
        </section>

        <section class="section">
            <h2>[ 3. 事件日誌清單 ]</h2>
            <div class="table-container">
                <table id="dataTable">
                    <thead><tr><th>發生日期</th><th>所屬轄區</th><th>案類代碼</th><th>案發詳細地點</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </section>
    </div>
    <script src="Crime_Map_Analysis.js"></script>
</body>
</html>
