<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>臺北市犯罪偵查熱度圖</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://leaflet.github.io/Leaflet.heat/dist/leaflet-heat.js"></script>
    <link href="Crime_Map_Heat.css" rel="stylesheet" />
</head>
<body data-theme="dark">

    <header class="header">
        <div class="header-left">
            <button id="mobile-toggle" class="mobile-toggle-btn">☰ 系統選單</button>
            <h1>犯罪情報監測系統</h1>
        </div>
        <button id="theme-toggle" class="action-button primary">切換警政模式</button>
    </header>

    <div class="content-container">
        <div class="sidebar" id="sidebar">
            <div class="section">
                <div id="crime-count" class="stat-value">---</div>
                <div style="text-align:center; font-size: 0.8rem; opacity: 0.8;">監控案件總數</div>
            </div>
            
            <div class="section">
                <div class="control-group">
                    <label>管轄區域</label>
                    <select id="district-select">
                        <option value="all">全台北市</option>
                        <option value="中正區">中正區</option><option value="大同區">大同區</option>
                        <option value="中山區">中山區</option><option value="松山區">松山區</option>
                        <option value="大安區">大安區</option><option value="萬華區">萬華區</option>
                        <option value="信義區">信義區</option><option value="士林區">士林區</option>
                        <option value="北投區">北投區</option><option value="內湖區">內湖區</option>
                        <option value="南港區">南港區</option><option value="文山區">文山區</option>
                    </select>
                </div>
                
                <div class="control-group">
                    <label>案件類型</label>
                    <select id="crime-type-select">
                        <option value="all">所有案類</option>
                    </select>
                </div>

                <div class="control-group">
                    <label>分析年份: <span id="year-value">2023</span></label>
                    <input type="range" id="time-range" min="2014" max="2023" value="2023">
                </div>
            </div>

            <div class="section">
                <div class="control-group">
                    <label>掃描半徑: <span id="radius-value">25</span></label>
                    <input type="range" id="heatmap-radius" min="5" max="50" value="25">
                </div>
                <div class="control-group">
                    <label>模糊程度: <span id="blur-value">15</span></label>
                    <input type="range" id="heatmap-blur" min="5" max="50" value="15">
                </div>
                <div class="control-group">
                    <label>最小不透明度: <span id="opacity-value">0.4</span></label>
                    <input type="range" id="heatmap-opacity" min="0" max="1" step="0.1" value="0.4">
                </div>
            </div>

            <div class="button-group">
                <button class="toggle-button" onclick="window.location.href='https://kai0514.github.io/Repo_1/Crime_Map_Web/Crime_Map_Analysis.html'">統計分析</button>
                <button class="toggle-button" onclick="window.location.href='https://kai0514.github.io/Repo_1/Crime_Map_Web/Crime_Map_Buffer.html'">環域工具</button>
            </div>  
        </div>

        <div class="map-container">
            <div id="map"></div>
            <div id="legend" class="map-legend">
                <div class="legend-title">犯罪案件密度</div>
                <div class="legend-gradient"></div>
                <div class="legend-scale">
                    <span>低風險</span>
                    <span>極高風險</span>
                </div>
            </div>
        </div>
    </div>
    <script src="Crime_Map_Heat.js"></script>
</body>
</html>
