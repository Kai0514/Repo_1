<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>北部空品與氣象時空分析系統 v5.1</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>

<div class="app-wrapper">
    <header>
        <div>🛰️ 北部空品區 2019~2023 空氣品質資料</div>
        <div style="font-size: 0.8rem; opacity: 0.8;">GIS Professional v5.1</div>
    </header>
    
    <div class="main-content">
        <aside class="sidebar">
            <div class="slider-container">
                <h4>📅 時間選擇</h4>
                <span class="time-display" id="currentTimeLabel">--</span>
                <input type="range" id="timeSlider" min="0" max="23" value="0">
                <input type="date" id="dateInput" value="2019-01-01">
            </div>
            <div>
                <h4>📍 測站篩選</h4>
                <div class="tag-container" id="stationTags"></div>
            </div>
        </aside>

        <main id="map"></main>

        <section class="detail-panel">
            <div id="defaultMsg" style="text-align:center; margin-top:50px; color:#999;">
                <p>💡 點擊測站圖示查看真實趨勢與降雨分析</p>
            </div>
            
            <div id="analysisContent" style="display:none;">
                <div class="card" style="border-top: 4px solid var(--primary);">
                    <h3 id="viewName" style="margin:0;">--</h3>
                    <div id="viewAQI" class="stat-aqi-val">--</div>
                    <div id="viewDetail" style="font-size:0.85rem; color:#666;"></div>
                </div>

                <div class="card">
                    <h4>🌡️ 24H 氣象分析 (雙軸)</h4>
                    <canvas id="weatherChart"></canvas>
                </div>

                <div class="card">
                    <h4>😷 24H AQI 變化趨勢</h4>
                    <canvas id="aqi24hChart"></canvas>
                </div>
            </div>
        </section>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
