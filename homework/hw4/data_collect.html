<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>資料收集工具</title>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    #data-table { margin-top: 20px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 10px; border: 1px solid #ccc; }
    th { background-color: #f4f4f4; }
    .delete-btn { color: red; cursor: pointer; }
    #chartContainer { margin-top: 20px; }
  </style>
</head>
<body>
  <script>
  $(document).ready(function() {
    let dataEntries = [];
    let ctx = $('#dataChart'); //圖表初始化
    let dataChart = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: [],
        datasets: [{
          label: '每個日期的輸入次數',
          data: [],
          backgroundColor: 'rgba(75, 192, 192, 0.2)',
          borderColor: 'rgba(75, 192, 192, 1)',
          borderWidth: 1
        }]
      },
      options: {
        scales: {
          y: { beginAtZero: true }
        }
      }
    });

    function updateChart() { // 動態更新圖表的function
      let dateCounts = {};
      dataEntries.forEach(entry => {
        dateCounts[entry.date] = (dateCounts[entry.date] || 0) + 1;
      });
  
      let dates = Object.keys(dateCounts);
      let counts = Object.values(dateCounts);
  
      dataChart.data.labels = dates;
      dataChart.data.datasets[0].data = counts;
      dataChart.update();
    }
  
    function addData(dataText, dataDate, dataImage) { // 新增數據的function
      let newEntry = { text: dataText, date: dataDate, image: dataImage };
      dataEntries.push(newEntry);
  
      // 將輸入資料新增到表格中
      let row = `<tr> 
        <td>${dataText}</td>
        <td>${dataDate}</td>
        <td>${dataImage ? `<img src="${URL.createObjectURL(dataImage)}" width="50" />` : '無圖片'}</td>
        <td><span class="delete-btn">刪除</span></td>
      </tr>`;
      $('#tableData tbody').append(row);
  
      updateChart(); // 更新圖表
    }
  
    $('#dataForm').on('submit', function(e) { // 表單提交處理
      e.preventDefault();
  
      let dataText = $('#dataText').val();
      let dataDate = $('#dataDate').val();
      let dataImage = $('#dataImage')[0].files[0];
  
      addData(dataText, dataDate, dataImage);
  
      $('#dataText').val(''); // 清空表單
      $('#dataDate').val('');
      $('#dataImage').val('');
    });
  
    $('#tableData').on('click', '.delete-btn', function() { // 刪除數據的function
      let rowIndex = $(this).closest('tr').index();
      dataEntries.splice(rowIndex, 1); // 刪除數據
      $(this).closest('tr').remove();  // 刪除表格行
  
      updateChart(); // 刪除後更新圖表
    });
  });  
  </script>

  <h1>資料收集工具</h1>

  <form id="dataForm">   <!-- 數據輸入表單 -->
    <label for="dataText">名稱輸入：</label>
    <input type="text" id="dataText" name="dataText" required><br><br>

    <label for="dataDate">選擇日期：</label>
    <input type="date" id="dataDate" name="dataDate" required><br><br>

    <label for="dataImage">上傳檔案：</label>
    <input type="file" id="dataImage" name="dataImage" accept="image/*"><br><br>

    <button type="submit">新增資料</button>
  </form>

  <div id="data-table"> <!-- 顯示資料的表格 -->
    <h2>已收集數據</h2>
    <table id="tableData">
      <thead>
        <tr>
          <th>文字</th>
          <th>日期</th>
          <th>圖片</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody>
      </tbody>
    </table>
  </div>

  <div id="chartContainer"> <!--圖表展示-->
    <h2>資料按日統計圖表</h2>
    <canvas id="dataChart"></canvas>
  </div>

  <script src="app.js"></script>
</body>
</html>
