<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>Position 定位練習</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            height: 2000px; /* 增加高度以便測試滾動效果 */
            background-color: #f0f0f0;
        }

        /* 1. Fixed 定位：釘在螢幕最上方，不隨滾動條移動 */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            height: 60px;
            background-color: #2E1065;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .container {
            margin-top: 100px;
            padding: 20px;
        }

        /* 2. Relative 與 Absolute 的組合 */
        .card {
            position: relative; /* 作為基準點 */
            width: 300px;
            height: 200px;
            background-color: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin-bottom: 50px;
            padding: 20px;
        }

        .badge {
            position: absolute; /* 相對於 .card 定位 */
            top: -10px;
            right: -10px;
            background-color: #FF4757;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
        }

        /* 3. Relative 定位：原地偏移 */
        .box-relative {
            position: relative;
            top: 20px;
            left: 50px;
            width: 200px;
            padding: 10px;
            background-color: #4F46E5;
            color: white;
            margin-bottom: 50px;
        }

        /* 4. Sticky 定位：滾動到它時會「黏」在設定的位置 */
        .sticky-header {
            position: sticky;
            top: 60px; /* 黏在 fixed navbar 的下方 */
            background-color: #FACC15;
            padding: 10px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .content-section {
            background-color: white;
            padding: 20px;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <nav class="navbar">我是 Fixed 導覽列（永遠在最上面）</nav>

    <div class="container">
        
        <h3>1. Relative + Absolute 範例</h3>
        <div class="card">
            <span class="badge">HOT 熱門</span>
            <p>這個紅色標籤使用了 <b>Absolute</b> 定位，它參考了設定為 <b>Relative</b> 的白色卡片邊界。</p>
        </div>

        <h3>2. Relative 原地偏移範例</h3>
        <div class="box-relative">
            我是 Relative，我比原本的位置向下移了 20px，向左移了 50px。
        </div>

        <h3>3. Sticky 黏性定位範例</h3>
        <div class="sticky-header">
            往下滾動看看，我會黏在導覽列下方！
        </div>

        <div class="content-section">
            <p>這裡有很多文字內容...</p>
            <p>（請嘗試向下滾動滑鼠，觀察黃色區塊與頂部導覽列的變化）</p>
            <p>..內容填充..</p>
            <p>..內容填充..</p>
            <p>..內容填充..</p>
            <p>..內容填充..</p>
        </div>
    </div>

</body>
</html>
