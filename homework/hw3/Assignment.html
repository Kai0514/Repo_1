<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>台鐵進出站人數查詢</title>
  </head>
  <body>
    <h1>台鐵進出站人數查詢</h1>

    <label for="dateSelect">選擇日期：</label> <!--製作日期的下拉式選單-->
    <select id="dateSelect"></select>

    <label for="stationSelect">選擇車站代碼：</label> <!--製作車站的下拉式選單-->
    <select id="stationSelect"></select>

    <button onclick="showStationData()">查詢</button> <!--製作查詢按鈕(按下顯示查詢結果)-->

    <div id="result"></div> <!--查詢結果框-->

    <script>
      fetch("Train.json") //導入台鐵進出站人數統計
        .then(response => response.json())
        .then(data => {
          const dates = [...new Set(data.map(item => item.trnOpDate))];
          const stations = [...new Set(data.map(item => item.staCode))];

          const dateSelect = document.getElementById("dateSelect");
          dates.forEach(date => {
            const option = document.createElement("option");
            option.value = date;
            option.text = date;
            dateSelect.appendChild(option);
          });

          const stationSelect = document.getElementById("stationSelect");
          stations.forEach(station => {
            const option = document.createElement("option");
            option.value = station;
            option.text = station;
            stationSelect.appendChild(option);
          });

          window.trainData = data;
        });

      function showStationData() {
        const selectedDate = document.getElementById("dateSelect").value;
        const selectedStation = document.getElementById("stationSelect").value;

        const filteredData = window.trainData.filter(item => item.trnOpDate === selectedDate && item.staCode === selectedStation);

        const resultDiv = document.getElementById("result");
        if (filteredData.length > 0) {
          const stationData = filteredData[0];
          resultDiv.innerHTML = `
            <h3>查詢結果</h3>
            <p>日期: ${stationData.trnOpDate}</p>
            <p>車站代碼: ${stationData.staCode}</p>
            <p>進站人數: ${stationData.gateInComingCnt}</p>
            <p>出站人數: ${stationData.gateOutGoingCnt}</p>
          `;
        } else {
          resultDiv.innerHTML = "<p>找不到對應的資料</p>";
        }
      }
    </script>
  </body>
</html>
