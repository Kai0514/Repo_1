<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zhe-Kai | Photo Gallery</title>

<style>

/* ===== 全域 ===== */

body{
  margin:0;
  font-family: "Hiragino Sans","Noto Sans TC",sans-serif;
  background:#f8f9f4;
  color:#444;
}

/* ===== 導覽列 ===== */

nav{
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  background:#ffffff;
  border-bottom:1px solid #e5e7eb;
  z-index:100;
}

nav a{
  flex:1;
  padding:18px 0;
  text-align:center;
  color:#555;
  text-decoration:none;
  transition:0.3s;
}

nav a:hover{
  background:#eef2f7;
}

/* ===== 主容器 ===== */

.container{
  padding:100px 60px 60px 60px;
  display:grid;
  gap:50px;
}

/* ===== 每個分類卡片 ===== */

.section{
  background:white;
  border-radius:25px;
  padding:30px;
  box-shadow:0 8px 20px rgba(0,0,0,0.05);
}

.section h3{
  text-align:center;
  margin-bottom:25px;
  font-weight:500;
  letter-spacing:2px;
}

/* ===== 圖片網格 ===== */

.photo-gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
}

.photo-gallery img{
  width:100%;
  height:220px;
  object-fit:cover;
  border-radius:20px;
  transition:0.4s;
  cursor:pointer;
}

.photo-gallery img:hover{
  transform:scale(1.05);
  box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

/* ===== RWD ===== */

@media(max-width:768px){
  .container{
    padding:100px 20px 40px 20px;
  }

  .photo-gallery img{
    height:180px;
  }
}

</style>
</head>

<body>
